# ========================================
# Docker Compose Configuration
# Modern Node.js Blog Application
# ========================================

services:
  # ========================================
  # Development Service
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: blogapp-dev
    ports:
      - '3000:3000' # API server


    environment:
      NODE_ENV: development
      DOCKER_ENV: 'true'
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: blogapp
      POSTGRES_USER: blogapp
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-blogapp_password}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}'
    volumes:
       - ./:/usr/src/app/
      # node_modules workaround for volumes
      # https://stackoverflow.com/a/32785014

    depends_on:
      db:
        condition: service_healthy


    restart: unless-stopped
    networks:
      - blogapp-network



  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:18-alpine
    container_name: blogapp-db
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-blogapp}'
      POSTGRES_USER: '${POSTGRES_USER:-blogapp}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-blogapp_password}'
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-blogapp} -d ${POSTGRES_DB:-blogapp}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - blogapp-network

# ========================================
# Volume Configuration
# ========================================
volumes:
  postgres_data:
    name: blogapp-postgres-data
    driver: local

# ========================================
# Network Configuration
# ========================================
networks:
  blogapp-network:
    name: blogapp-network
    driver: bridge
